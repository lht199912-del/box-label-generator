<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商家运营工具箱</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #182033;
      --muted: #64708a;
      --line: #d9dfeb;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }

    header {
      padding: 18px 24px 0;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      max-width: 1440px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .hint {
      margin: -6px 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tab {
      border: 0;
      border-bottom: 3px solid transparent;
      background: transparent;
      color: #34405a;
      padding: 12px 16px 10px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    .tab:hover {
      color: var(--accent-dark);
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 16px 24px 24px;
    }

    .panel {
      display: none;
      min-height: calc(100vh - 135px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .panel.active {
      display: block;
    }

    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 155px);
      min-height: 720px;
      border: 0;
      background: #fff;
    }

    .future {
      padding: 32px;
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 760px) {
      header {
        padding: 14px 12px 0;
      }

      main {
        padding: 12px;
      }

      .top {
        display: block;
      }

      .tab {
        padding: 10px 12px 8px;
      }

      iframe {
        min-height: 820px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div>
        <h1>商家运营工具箱</h1>
        <p class="hint">一个网址进入，按功能切换。后续可以继续增加更多工具。</p>
      </div>
      <nav class="tabs" aria-label="工具切换">
        <button class="tab active" type="button" data-target="box-label">箱唛生成器</button>
        <button class="tab" type="button" data-target="barcode">条形码生成器</button>
      </nav>
    </div>
  </header>

  <main>
    <section id="box-label" class="panel active" aria-label="箱唛生成器">
      <iframe title="箱唛生成器" src="./box-label/index.html"></iframe>
    </section>
    <section id="barcode" class="panel" aria-label="条形码生成器">
      <iframe title="条形码生成器" src="./barcode/index.html"></iframe>
    </section>
  </main>

  <script>
    const tabs = [...document.querySelectorAll(".tab")];
    const panels = [...document.querySelectorAll(".panel")];

    function activate(target) {
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.target === target));
      panels.forEach((panel) => panel.classList.toggle("active", panel.id === target));
      const url = new URL(window.location.href);
      url.hash = target;
      history.replaceState(null, "", url);
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => activate(tab.dataset.target));
    });

    const initial = window.location.hash.replace("#", "");
    if (initial && document.getElementById(initial)) {
      activate(initial);
    }
  </script>
</body>
</html>
