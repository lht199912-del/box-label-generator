<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>俄罗斯箱唛 Word 生成器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #182033;
      --muted: #64708a;
      --line: #d9dfeb;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #d92d20;
      --soft: #eef4ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }

    header {
      padding: 22px 28px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    main {
      display: grid;
      grid-template-columns: minmax(720px, 1fr) 360px;
      gap: 18px;
      padding: 18px 28px 28px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }

    h2 {
      margin: 0;
      font-size: 16px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
    }

    button:hover {
      border-color: #a8b4ca;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button.danger {
      border-color: #ffd4d0;
      color: var(--danger);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .metric {
      padding: 12px;
      background: var(--soft);
      border-radius: 8px;
    }

    .metric b {
      display: block;
      font-size: 24px;
      margin-bottom: 4px;
    }

    .metric span {
      color: var(--muted);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      vertical-align: top;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f8faff;
      color: #34405a;
      font-weight: 700;
      white-space: nowrap;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      color: var(--text);
      font: inherit;
      line-height: 1.4;
      background: #fff;
    }

    textarea {
      min-height: 74px;
      resize: vertical;
    }

    input[type="number"] {
      width: 88px;
    }

    .range {
      min-width: 112px;
      color: var(--muted);
      line-height: 34px;
      white-space: nowrap;
    }

    .actions {
      width: 74px;
      white-space: nowrap;
    }

    .preview {
      padding: 16px;
    }

    .label-page {
      width: 100%;
      min-height: 0;
      aspect-ratio: 10 / 15;
      border: 1px solid var(--line);
      background: #fff;
      padding: 28px 24px;
      box-shadow: 0 2px 10px rgba(24, 32, 51, 0.08);
      font-family: Calibri, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.65;
    }

    .label-page p {
      margin: 0 0 12px;
    }

    .label-page .wrap {
      overflow-wrap: anywhere;
    }

    .side-panel {
      position: sticky;
      top: 14px;
      align-self: start;
    }

    .settings {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    label {
      display: grid;
      gap: 6px;
      color: #34405a;
      font-weight: 700;
    }

    label small {
      color: var(--muted);
      font-weight: 400;
    }

    .notice {
      margin: 14px 16px 0;
      padding: 10px 12px;
      border-radius: 8px;
      color: #475569;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      line-height: 1.6;
    }

    .error {
      color: var(--danger);
      background: #fff4f2;
      border-color: #ffd4d0;
      display: none;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    .status.ok {
      color: #047857;
    }

    .status.warn {
      color: #b45309;
    }

    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      color: var(--text);
      font: inherit;
      background: #fff;
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      header {
        padding: 18px 14px 12px;
      }

      .side-panel {
        position: static;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>俄罗斯箱唛 Word 生成器</h1>
    <p class="hint">按产品填写箱数和箱唛信息，系统会自动连续分配箱号，例如 A 产品 10 箱是 1/100 到 10/100，B 产品 20 箱是 11/100 到 30/100。导出的 Word 文档一页一张箱唛。</p>
  </header>

  <main>
    <section>
      <div class="section-head">
        <h2>产品信息</h2>
        <div class="toolbar">
          <button id="addRowBtn" type="button">添加产品</button>
          <button id="sampleBtn" type="button">填入示例</button>
          <button id="clearBtn" type="button" class="danger">清空</button>
        </div>
      </div>

      <div class="summary">
        <div class="metric"><b id="productCount">0</b><span>产品款数</span></div>
        <div class="metric"><b id="totalBoxes">0</b><span>总箱数</span></div>
        <div class="metric"><b id="lastRange">-</b><span>最后箱号</span></div>
      </div>

      <div id="errorBox" class="notice error"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>产品代号</th>
              <th>箱数</th>
              <th>每箱数量</th>
              <th>产地</th>
              <th>产品名称</th>
              <th>厂商</th>
              <th>收件人</th>
              <th>箱号范围</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>

    <section class="side-panel">
      <div class="section-head">
        <h2>导出设置</h2>
      </div>
      <div class="settings">
        <label>
          文件名
          <input id="fileName" value="俄罗斯箱唛">
        </label>
        <label>
          纸张宽度（厘米）
          <small>常用箱唛尺寸：10</small>
          <input id="paperWidthCm" type="number" value="10" min="3" max="30" step="0.1">
        </label>
        <label>
          纸张高度（厘米）
          <small>常用箱唛尺寸：15</small>
          <input id="paperHeightCm" type="number" value="15" min="3" max="30" step="0.1">
        </label>
        <label>
          字体大小
          <small>默认 15pt；WPS 里“四号”约等于 14pt</small>
          <input id="fontSize" type="number" value="15" min="8" max="36">
        </label>
        <label>
          页边距（毫米）
          <small>数值越小，内容越靠边</small>
          <input id="marginMm" type="number" value="5" min="2" max="40">
        </label>
        <label>
          行距
          <small>截图类似效果建议 1.10-1.25</small>
          <input id="lineSpacing" type="number" value="1.15" min="1" max="2" step="0.05">
        </label>
        <label>
          段后间距（磅）
          <small>数值越大，每行之间越松</small>
          <input id="paragraphAfter" type="number" value="10" min="0" max="36">
        </label>
        <label>
          保存方式
          <small>指定目录保存需要用 Edge 或 Chrome 打开</small>
          <select id="saveMode">
            <option value="download">浏览器下载</option>
            <option value="directory">选择目录保存</option>
          </select>
        </label>
        <button id="exportBtn" type="button" class="primary">导出 Word 文档</button>
        <div id="exportStatus" class="status"></div>
      </div>
      <div class="preview">
        <h2>第一页预览</h2>
        <div class="label-page" id="preview"></div>
      </div>
    </section>
  </main>

  <script>
    const rowsEl = document.getElementById("rows");
    const previewEl = document.getElementById("preview");
    const errorBox = document.getElementById("errorBox");
    const enc = new TextEncoder();

    const defaults = {
      code: "A",
      boxCount: 10,
      pieces: 30,
      origin: "China",
      productName: "Фаллоимитатор",
      manufacturer: "Huizhou Sangsine Intelligent Technology Co., Ltd.",
      consignee: "ОБЩЕСТВО С ОГРАНИЧЕННОЙ ОТВЕТСТВЕННОСТЬЮ \"СЕНСОРИ АРТ\""
    };

    const sampleRows = [
      { ...defaults, code: "A", boxCount: 10, pieces: 30 },
      { ...defaults, code: "B", boxCount: 20, pieces: 24, productName: "Вибратор" },
      { ...defaults, code: "C", boxCount: 15, pieces: 50, productName: "Массажер" },
      { ...defaults, code: "D", boxCount: 55, pieces: 12, productName: "Аксессуар" }
    ];

    let products = [{ ...defaults }];

    function escapeXml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&apos;");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;");
    }

    function setError(message) {
      errorBox.textContent = message || "";
      errorBox.style.display = message ? "block" : "none";
    }

    function readProductsFromDom() {
      products = [...rowsEl.querySelectorAll("tr")].map((tr) => ({
        code: tr.querySelector("[data-field='code']").value.trim(),
        boxCount: Number(tr.querySelector("[data-field='boxCount']").value),
        pieces: Number(tr.querySelector("[data-field='pieces']").value),
        origin: tr.querySelector("[data-field='origin']").value.trim(),
        productName: tr.querySelector("[data-field='productName']").value.trim(),
        manufacturer: tr.querySelector("[data-field='manufacturer']").value.trim(),
        consignee: tr.querySelector("[data-field='consignee']").value.trim()
      }));
    }

    function getRanges(items) {
      const total = items.reduce((sum, item) => sum + positiveInt(item.boxCount), 0);
      let cursor = 1;
      return items.map((item) => {
        const count = positiveInt(item.boxCount);
        const start = cursor;
        const end = cursor + count - 1;
        cursor += count;
        return { start, end, total, count };
      });
    }

    function positiveInt(value) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed) || parsed < 0) return 0;
      return Math.floor(parsed);
    }

    function validate(items) {
      if (!items.length) return "请至少添加一款产品。";
      for (let i = 0; i < items.length; i += 1) {
        const row = items[i];
        const rowName = row.code || `第 ${i + 1} 行`;
        if (!positiveInt(row.boxCount)) return `${rowName} 的箱数必须大于 0。`;
        if (!positiveInt(row.pieces)) return `${rowName} 的每箱数量必须大于 0。`;
        if (!row.origin) return `${rowName} 缺少产地。`;
        if (!row.productName) return `${rowName} 缺少产品名称。`;
        if (!row.manufacturer) return `${rowName} 缺少厂商。`;
        if (!row.consignee) return `${rowName} 缺少收件人。`;
      }
      return "";
    }

    function renderRows() {
      rowsEl.innerHTML = "";
      const ranges = getRanges(products);

      products.forEach((item, index) => {
        const range = ranges[index];
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input data-field="code" value="${escapeHtml(item.code)}" placeholder="A"></td>
          <td><input data-field="boxCount" type="number" min="1" value="${escapeHtml(item.boxCount)}"></td>
          <td><input data-field="pieces" type="number" min="1" value="${escapeHtml(item.pieces)}"></td>
          <td><input data-field="origin" value="${escapeHtml(item.origin)}"></td>
          <td><textarea data-field="productName">${escapeHtml(item.productName)}</textarea></td>
          <td><textarea data-field="manufacturer">${escapeHtml(item.manufacturer)}</textarea></td>
          <td><textarea data-field="consignee">${escapeHtml(item.consignee)}</textarea></td>
          <td class="range">${range.count ? `${range.start}/${range.total} - ${range.end}/${range.total}` : "-"}</td>
          <td class="actions"><button type="button" data-action="copy">复制</button><button type="button" data-action="delete" class="danger">删除</button></td>
        `;
        tr.querySelectorAll("input, textarea").forEach((input) => {
          input.addEventListener("input", () => {
            readProductsFromDom();
            updateCalculatedOnly();
          });
        });
        tr.querySelector("[data-action='copy']").addEventListener("click", () => {
          readProductsFromDom();
          products.splice(index + 1, 0, { ...products[index], code: nextCode(products[index].code) });
          renderRows();
          updateAll();
        });
        tr.querySelector("[data-action='delete']").addEventListener("click", () => {
          readProductsFromDom();
          products.splice(index, 1);
          renderRows();
          updateAll();
        });
        rowsEl.appendChild(tr);
      });
    }

    function nextCode(code) {
      const match = String(code || "").match(/^(.*?)(\d+)$/);
      if (match) return `${match[1]}${Number(match[2]) + 1}`;
      if (/^[A-Z]$/i.test(code)) return String.fromCharCode(code.toUpperCase().charCodeAt(0) + 1);
      return `${code || "产品"}-副本`;
    }

    function updateCalculatedOnly() {
      const ranges = getRanges(products);
      [...rowsEl.querySelectorAll("tr")].forEach((tr, index) => {
        const range = ranges[index];
        tr.querySelector(".range").textContent = range.count ? `${range.start}/${range.total} - ${range.end}/${range.total}` : "-";
      });
      updateAll();
    }

    function updateAll() {
      const ranges = getRanges(products);
      const total = ranges[0]?.total || 0;
      document.getElementById("productCount").textContent = products.length;
      document.getElementById("totalBoxes").textContent = total;
      document.getElementById("lastRange").textContent = total ? `${total}/${total}` : "-";
      setError(validate(products) && validate(products));
      renderPreview(products, ranges);
    }

    function renderPreview(items, ranges) {
      const previewFontSize = Number(document.getElementById("fontSize").value || 15);
      const previewLineSpacing = Number(document.getElementById("lineSpacing").value || 1.15);
      const previewParagraphAfter = Number(document.getElementById("paragraphAfter").value || 10);
      const paperWidthCm = Number(document.getElementById("paperWidthCm").value || 10);
      const paperHeightCm = Number(document.getElementById("paperHeightCm").value || 15);
      previewEl.style.fontSize = `${previewFontSize}px`;
      previewEl.style.lineHeight = String(previewLineSpacing);
      previewEl.style.aspectRatio = `${paperWidthCm} / ${paperHeightCm}`;

      if (!items.length || !ranges[0]?.count) {
        previewEl.innerHTML = "<p>添加产品后显示第一页预览。</p>";
        return;
      }

      const first = items[0];
      const total = ranges[0].total;
      previewEl.innerHTML = `
        <p><strong>Box No.:</strong>（&nbsp;&nbsp;1/${total}）</p>
        <p><strong>Country of origin:</strong> ${escapeHtml(first.origin)}</p>
        <p class="wrap"><strong>Product Name:</strong> ${escapeHtml(first.productName)}</p>
        <p class="wrap"><strong>Manufacturer:</strong> ${escapeHtml(first.manufacturer)}</p>
        <p class="wrap"><strong>Consignee:</strong> ${escapeHtml(first.consignee)}</p>
        <p><strong>Number of products（Pieces）：</strong> ${escapeHtml(first.pieces)}</p>
      `;
      previewEl.querySelectorAll("p").forEach((p) => {
        p.style.marginBottom = `${previewParagraphAfter}px`;
      });
    }

    function labelsFromProducts(items) {
      const ranges = getRanges(items);
      const labels = [];
      items.forEach((item, index) => {
        const range = ranges[index];
        for (let boxNo = range.start; boxNo <= range.end; boxNo += 1) {
          labels.push({ ...item, boxNo, total: range.total });
        }
      });
      return labels;
    }

    function splitLines(value) {
      return String(value ?? "").split(/\r?\n/).flatMap((line) => {
        const trimmed = line.trim();
        return trimmed ? [trimmed] : [];
      });
    }

    function paragraphSpacingXml() {
      const afterPt = Number(document.getElementById("paragraphAfter").value || 10);
      const spacingAfter = Math.round(afterPt * 20);
      const lineMultiple = Number(document.getElementById("lineSpacing").value || 1.15);
      const lineSpacing = Math.round(lineMultiple * 240);
      return `<w:spacing w:after="${spacingAfter}" w:line="${lineSpacing}" w:lineRule="auto"/>`;
    }

    function runXml(text, options = {}) {
      const size = Number(document.getElementById("fontSize").value || 15) * 2;
      const boldOpen = options.bold ? "<w:b/>" : "";
      return `<w:r><w:rPr><w:rFonts w:ascii="Calibri" w:hAnsi="Calibri" w:eastAsia="Microsoft YaHei" w:cs="Arial"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/>${boldOpen}</w:rPr><w:t xml:space="preserve">${escapeXml(text)}</w:t></w:r>`;
    }

    function paragraph(text) {
      return `<w:p><w:pPr>${paragraphSpacingXml()}</w:pPr>${runXml(text)}</w:p>`;
    }

    function fieldParagraph(label, value) {
      return `<w:p><w:pPr>${paragraphSpacingXml()}</w:pPr>${runXml(label, { bold: true })}${runXml(value)}</w:p>`;
    }

    function labelXml(label, isLast) {
      const lines = [];
      lines.push(fieldParagraph("Box No.:", `（   ${label.boxNo}/${label.total}）`));
      lines.push(fieldParagraph("Country of origin:", ` ${label.origin}`));
      splitLines(label.productName).forEach((line, idx) => lines.push(idx ? paragraph(line) : fieldParagraph("Product Name:", ` ${line}`)));
      splitLines(label.manufacturer).forEach((line, idx) => lines.push(idx ? paragraph(line) : fieldParagraph("Manufacturer:", ` ${line}`)));
      splitLines(label.consignee).forEach((line, idx) => lines.push(idx ? paragraph(line) : fieldParagraph("Consignee:", ` ${line}`)));
      lines.push(fieldParagraph("Number of products（Pieces）：", ` ${label.pieces}`));
      if (!isLast) lines.push(`<w:p><w:r><w:br w:type="page"/></w:r></w:p>`);
      return lines.join("");
    }

    function documentXml(labels) {
      const marginTwips = Math.round(Number(document.getElementById("marginMm").value || 5) * 56.6929);
      const pageWidthTwips = Math.round(Number(document.getElementById("paperWidthCm").value || 10) * 566.929);
      const pageHeightTwips = Math.round(Number(document.getElementById("paperHeightCm").value || 15) * 566.929);
      const body = labels.map((label, index) => labelXml(label, index === labels.length - 1)).join("");
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:body>
    ${body}
    <w:sectPr>
      <w:pgSz w:w="${pageWidthTwips}" w:h="${pageHeightTwips}"/>
      <w:pgMar w:top="${marginTwips}" w:right="${marginTwips}" w:bottom="${marginTwips}" w:left="${marginTwips}" w:header="708" w:footer="708" w:gutter="0"/>
    </w:sectPr>
  </w:body>
</w:document>`;
    }

    function contentTypesXml() {
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;
    }

    function relsXml() {
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;
    }

    function crc32(bytes) {
      let crc = -1;
      for (let i = 0; i < bytes.length; i += 1) {
        crc ^= bytes[i];
        for (let j = 0; j < 8; j += 1) {
          crc = (crc >>> 1) ^ (0xedb88320 & -(crc & 1));
        }
      }
      return (crc ^ -1) >>> 0;
    }

    function u16(value) {
      return [value & 255, (value >>> 8) & 255];
    }

    function u32(value) {
      return [value & 255, (value >>> 8) & 255, (value >>> 16) & 255, (value >>> 24) & 255];
    }

    function dosDateTime(date = new Date()) {
      const time = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
      const dosDate = ((date.getFullYear() - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate();
      return { time, dosDate };
    }

    function makeZip(files) {
      const chunks = [];
      const central = [];
      let offset = 0;
      const { time, dosDate } = dosDateTime();

      files.forEach((file) => {
        const nameBytes = enc.encode(file.name);
        const dataBytes = enc.encode(file.data);
        const crc = crc32(dataBytes);
        const localHeader = new Uint8Array([
          ...u32(0x04034b50), ...u16(20), ...u16(2048), ...u16(0), ...u16(time), ...u16(dosDate),
          ...u32(crc), ...u32(dataBytes.length), ...u32(dataBytes.length), ...u16(nameBytes.length), ...u16(0)
        ]);
        chunks.push(localHeader, nameBytes, dataBytes);
        central.push(new Uint8Array([
          ...u32(0x02014b50), ...u16(20), ...u16(20), ...u16(2048), ...u16(0), ...u16(time), ...u16(dosDate),
          ...u32(crc), ...u32(dataBytes.length), ...u32(dataBytes.length), ...u16(nameBytes.length), ...u16(0),
          ...u16(0), ...u16(0), ...u16(0), ...u32(0), ...u32(offset)
        ]), nameBytes);
        offset += localHeader.length + nameBytes.length + dataBytes.length;
      });

      const centralOffset = offset;
      let centralSize = 0;
      central.forEach((chunk) => {
        chunks.push(chunk);
        centralSize += chunk.length;
        offset += chunk.length;
      });
      chunks.push(new Uint8Array([
        ...u32(0x06054b50), ...u16(0), ...u16(0), ...u16(files.length), ...u16(files.length),
        ...u32(centralSize), ...u32(centralOffset), ...u16(0)
      ]));
      return new Blob(chunks, { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
    }

    function setExportStatus(message, type = "") {
      const status = document.getElementById("exportStatus");
      status.textContent = message || "";
      status.className = `status ${type}`.trim();
    }

    function getOutputFileName(labelCount) {
      const rawName = document.getElementById("fileName").value.trim() || "俄罗斯箱唛";
      const safeName = rawName.replace(/[\\/:*?"<>|]/g, "_");
      return `${safeName}_${labelCount}箱.docx`;
    }

    function buildDocxBlob(labels) {
      return makeZip([
        { name: "[Content_Types].xml", data: contentTypesXml() },
        { name: "_rels/.rels", data: relsXml() },
        { name: "word/document.xml", data: documentXml(labels) }
      ]);
    }

    function saveWithDownload(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 3000);
    }

    async function saveWithDirectoryPicker(blob, fileName) {
      if (!window.showDirectoryPicker) {
        throw new Error("当前浏览器不支持选择目录保存。请用 Microsoft Edge 或 Google Chrome 打开本工具，或改用“浏览器下载”。");
      }
      const directory = await window.showDirectoryPicker({ mode: "readwrite" });
      const fileHandle = await directory.getFileHandle(fileName, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
    }

    async function exportDocx() {
      readProductsFromDom();
      const problem = validate(products);
      if (problem) {
        setError(problem);
        setExportStatus("");
        return;
      }
      const labels = labelsFromProducts(products);
      const blob = buildDocxBlob(labels);
      const fileName = getOutputFileName(labels.length);
      const saveMode = document.getElementById("saveMode").value;

      setError("");
      setExportStatus("正在生成 Word 文档...");

      try {
        if (saveMode === "directory") {
          await saveWithDirectoryPicker(blob, fileName);
          setExportStatus(`已保存：${fileName}`, "ok");
        } else {
          saveWithDownload(blob, fileName);
          setExportStatus(`已生成：${fileName}。如果没有弹出下载，请用 Edge/Chrome 打开这个 HTML 文件。`, "ok");
        }
      } catch (error) {
        const message = error?.name === "AbortError"
          ? "已取消保存。"
          : (error?.message || "导出失败，请换用 Edge/Chrome 打开后再试。");
        setExportStatus(message, "warn");
      }
    }

    document.getElementById("addRowBtn").addEventListener("click", () => {
      readProductsFromDom();
      products.push({ ...defaults, code: nextCode(products.at(-1)?.code || "A") });
      renderRows();
      updateAll();
    });

    document.getElementById("sampleBtn").addEventListener("click", () => {
      products = sampleRows.map((item) => ({ ...item }));
      renderRows();
      updateAll();
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      products = [];
      renderRows();
      updateAll();
    });

    document.getElementById("exportBtn").addEventListener("click", exportDocx);
    document.getElementById("paperWidthCm").addEventListener("input", updateAll);
    document.getElementById("paperHeightCm").addEventListener("input", updateAll);
    document.getElementById("fontSize").addEventListener("input", updateAll);
    document.getElementById("marginMm").addEventListener("input", updateAll);
    document.getElementById("lineSpacing").addEventListener("input", updateAll);
    document.getElementById("paragraphAfter").addEventListener("input", updateAll);

    renderRows();
    updateAll();

    window.BoxLabelGenerator = {
      getProducts: () => products.map((item) => ({ ...item })),
      labelsFromProducts,
      contentTypesXml,
      relsXml,
      documentXml,
      makeZip
    };
  </script>
</body>
</html>
