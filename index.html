<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商家运营工具箱</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #151925;
      --muted: #6a7284;
      --line: #e1e5ee;
      --accent: #c4143d;
      --accent-dark: #9f0f31;
      --accent-soft: #fff0f4;
      --shadow: 0 18px 45px rgba(39, 43, 58, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 0%, rgba(196, 20, 61, 0.11), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 44%, #eef1f7 100%);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }

    header {
      padding: 22px 24px 0;
      background: rgba(255, 255, 255, 0.86);
      border-bottom: 1px solid rgba(225, 229, 238, 0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      max-width: 1680px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 300px;
    }

    .logo-mark {
      display: grid;
      place-items: center;
      width: 142px;
      min-width: 142px;
      height: 52px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(196, 20, 61, 0.12);
      overflow: hidden;
    }

    .logo-mark img {
      width: 122px;
      height: auto;
      display: block;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: 0;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .slogan {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 6px 12px;
      border: 1px solid rgba(196, 20, 61, 0.22);
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .slogan::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(196, 20, 61, 0.12);
    }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-bottom: 18px;
    }

    .tab {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #34405a;
      padding: 12px 16px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(39, 43, 58, 0.06);
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .tab:hover {
      transform: translateY(-1px);
      color: var(--accent-dark);
      border-color: rgba(196, 20, 61, 0.32);
      box-shadow: 0 12px 28px rgba(196, 20, 61, 0.1);
    }

    .tab.active {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #df3157);
      border-color: var(--accent);
      box-shadow: 0 14px 32px rgba(196, 20, 61, 0.22);
    }

    main {
      max-width: 1680px;
      margin: 0 auto;
      padding: 24px 32px 32px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      margin-bottom: 16px;
      padding: 18px 20px;
      border: 1px solid rgba(225, 229, 238, 0.9);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 12px 34px rgba(39, 43, 58, 0.08);
    }

    .hero-title {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 800;
    }

    .hero-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .hero-badge {
      padding: 10px 14px;
      border-radius: 10px;
      color: var(--accent-dark);
      background: var(--accent-soft);
      font-weight: 800;
      white-space: nowrap;
    }

    .panel {
      display: none;
      min-height: calc(100vh - 230px);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .panel.active {
      display: block;
    }

    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 250px);
      min-height: 860px;
      border: 0;
      background: #fff;
    }

    .future {
      padding: 32px;
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 640px) {
      header {
        padding: 14px 12px 0;
      }

      main {
        padding: 12px;
      }

      .top {
        display: block;
      }

      .brand {
        min-width: 0;
        align-items: flex-start;
      }

      .logo-mark {
        width: 112px;
        min-width: 112px;
        height: 44px;
      }

      .logo-mark img {
        width: 96px;
      }

      .tab {
        padding: 10px 12px;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .hero-badge {
        white-space: normal;
      }

      iframe {
        min-height: 820px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div class="brand">
        <div class="logo-mark" aria-label="AAV logo">
          <img src="./assets/aav-logo.png" alt="AAV">
        </div>
        <div>
          <h1>商家运营工具箱</h1>
          <p class="hint">俄罗斯 BU 日常作业中心，一个网址进入，按功能切换。</p>
          <div class="slogan">俄罗斯BU必胜</div>
        </div>
      </div>
      <nav class="tabs" aria-label="工具切换">
        <button class="tab active" type="button" data-target="box-label">箱唛生成器</button>
        <button class="tab" type="button" data-target="barcode">条形码生成器</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" aria-label="工具箱说明">
      <div>
        <p class="hero-title">把重复工作交给工具，把增长留给团队。</p>
        <p class="hero-copy">当前已集成箱唛 Word 生成和 Code 128 条形码生成；后续 SKU、面单、清单等工具可以继续扩展到这里。</p>
      </div>
      <div class="hero-badge">AAV Russia BU Operations</div>
    </section>

    <section id="box-label" class="panel active" aria-label="箱唛生成器">
      <iframe title="箱唛生成器" src="./box-label/index.html"></iframe>
    </section>
    <section id="barcode" class="panel" aria-label="条形码生成器">
      <iframe title="条形码生成器" src="./barcode/index.html"></iframe>
    </section>
  </main>

  <script>
    const tabs = [...document.querySelectorAll(".tab")];
    const panels = [...document.querySelectorAll(".panel")];

    function activate(target) {
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.target === target));
      panels.forEach((panel) => panel.classList.toggle("active", panel.id === target));
      const url = new URL(window.location.href);
      url.hash = target;
      history.replaceState(null, "", url);
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => activate(tab.dataset.target));
    });

    const initial = window.location.hash.replace("#", "");
    if (initial && document.getElementById(initial)) {
      activate(initial);
    }
  </script>
</body>
</html>
