<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>侵权索赔 Word 生成器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #182033;
      --muted: #64708a;
      --line: #d9e0eb;
      --accent: #c8143f;
      --accent-dark: #9e1234;
      --soft: #eef4ff;
      --danger: #d92d20;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }

    header {
      padding: 26px 32px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 28px;
      letter-spacing: 0;
    }

    header p {
      margin-top: 10px;
      max-width: 940px;
      line-height: 1.75;
      color: var(--muted);
    }

    main {
      display: grid;
      grid-template-columns: minmax(620px, 1.35fr) minmax(360px, 0.8fr);
      gap: 18px;
      padding: 18px 32px 32px;
    }

    section,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      font-size: 18px;
    }

    h3 {
      margin-bottom: 12px;
      font-size: 16px;
    }

    .content {
      padding: 18px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: #26324d;
      font-weight: 700;
      line-height: 1.35;
    }

    label small {
      color: var(--muted);
      font-weight: 400;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cfd8e8;
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 600;
      padding: 10px 11px;
      outline: none;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 20, 63, 0.13);
    }

    .block {
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .block + .block {
      margin-top: 16px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
    }

    button {
      border: 1px solid #cfd8e8;
      border-radius: 6px;
      background: #fff;
      color: #17213a;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 9px 13px;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button.danger {
      border-color: #ffd0d0;
      color: var(--danger);
    }

    .complaint-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }

    .complaint-tab {
      border-radius: 999px;
      padding: 8px 12px;
    }

    .complaint-tab.active {
      border-color: var(--accent);
      background: #fff1f5;
      color: var(--accent);
    }

    .summary {
      display: grid;
      gap: 10px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px dashed var(--line);
    }

    .summary-row strong {
      color: #293650;
    }

    .summary-row span {
      color: var(--muted);
      line-height: 1.55;
      word-break: break-word;
    }

    .notice {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #d7e2f5;
      border-radius: 8px;
      background: #f7fbff;
      color: #516180;
      line-height: 1.7;
    }

    .notice.error {
      display: none;
      border-color: #ffd0d0;
      background: #fff5f5;
      color: var(--danger);
    }

    .notice.status {
      display: none;
      border-color: #c8ead6;
      background: #f3fff7;
      color: #257044;
    }

    .choice-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 1080px) {
      main {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      header {
        padding: 22px 18px 16px;
      }
    }

    @media (max-width: 720px) {
      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>侵权索赔 Word 生成器</h1>
    <p>根据俄语《权利侵权索赔模板》生成 Word。页面只替换模板中的空线文字，不重建 Word 版式；卖方资料可下拉选择并自动带出，也可以复制新增多个投诉对象。</p>
  </header>

  <main>
    <section>
      <div class="section-head">
        <h2>填写信息</h2>
        <div class="toolbar">
          <button type="button" id="addComplaintBtn">新增投诉对象</button>
          <button type="button" id="cloneComplaintBtn">复制当前投诉</button>
          <button type="button" id="removeComplaintBtn" class="danger">删除当前</button>
        </div>
      </div>

      <div id="complaintTabs" class="complaint-tabs"></div>

      <div class="content">
        <div class="block">
          <h3>举报方信息（我方）</h3>
          <div class="grid-2">
            <label>
              举报方/申请人下拉选择
              <small>来自俄罗斯公司信息表；选择后自动带出地址、邮箱、税号等</small>
              <select id="reporterPreset"></select>
            </label>
            <label>
              举报方/申请人全称（俄语）
              <small>写入模板“от”后面的空格</small>
              <input id="reporterName" value="">
            </label>
          </div>
          <div class="grid-2">
            <label>
              举报方地址（俄语）
              <input id="reporterAddress" value="">
            </label>
            <label>
              举报方电话
              <input id="reporterPhone" value="">
            </label>
          </div>
          <div class="grid-2">
            <label>
              举报方邮箱
              <input id="reporterEmail" value="">
            </label>
            <label>
              举报方纳税人识别号（ИНН）
              <input id="reporterInn" value="">
            </label>
          </div>
          <label>
            举报方国家注册号/个体工商户注册号（ОГРН/ОГРНИП）
            <input id="reporterOgrn" value="">
          </label>

          <div class="toolbar">
            <button type="button" id="saveSellerBtn">保存为常用举报方</button>
          </div>
        </div>

        <div class="block">
          <h3>权利信息</h3>
          <div class="grid-2">
            <label>
              权利人全称（俄语）
              <small>权利人可以是第三方，不一定等于举报方</small>
              <input id="claimantName" value="">
            </label>
            <label>
              权利客体/商标/作品名称（俄语）
              <small>例如商标名、图片作品名、商品卡片涉及对象</small>
              <input id="ipObjectName" value="">
            </label>
          </div>
          <label>
            权利证明/注册信息（俄语）
            <small>例如证书号、注册号、授权文件说明</small>
            <input id="proofInfo" value="">
          </label>
          <label>
            所提出要求的法律依据
            <small>下拉框左侧为中文备注，右侧为写入 Word 的俄语</small>
            <select id="legalBasis"></select>
          </label>
          <div id="legalBasisText" class="choice-text"></div>
        </div>

        <div class="block">
          <h3>当前投诉对象</h3>
          <div class="grid-2">
            <label>
              投诉名称
              <small>用于区分多个商家和生成文件名</small>
              <input id="complaintTitle" value="">
            </label>
            <label>
              被举报方/卖方名称（俄语）
              <small>写入模板顶部第一条空线</small>
              <input id="sellerName" value="">
            </label>
          </div>
        </div>

        <div class="block">
          <h3>侵权事项</h3>
          <div class="grid-2">
            <label>
              侵权事实说明（俄语）
              <small>写入“нарушении ... выразившемся в”后的空线</small>
              <input id="productName" value="">
            </label>
            <label>
              商品卡片编号/链接
              <small>写入“Артикулы карточек товаров...”后的空线</small>
              <input id="productLink" value="">
            </label>
          </div>
          <label>
            请求事项
            <small>下拉框为中文备注 + 俄语写入内容；选择“其他”后手动填写</small>
            <select id="requestChoice"></select>
          </label>
          <textarea id="customRequest" placeholder="选择“其他”时，在这里填写俄语请求内容"></textarea>
          <div id="requestText" class="choice-text"></div>
        </div>

        <div class="block">
          <h3>附件、日期和签署</h3>
          <div class="grid-2">
            <label>
              附件 1（俄语）
              <input id="attachmentOne" value="">
            </label>
            <label>
              附件 2（俄语）
              <input id="attachmentTwo" value="">
            </label>
          </div>
          <div class="grid-3">
            <label>
              日期：日
              <select id="dateDay"></select>
            </label>
            <label>
              日期：月（中文 | 俄语）
              <select id="dateMonth"></select>
            </label>
            <label>
              日期：年
              <select id="dateYear"></select>
            </label>
          </div>
          <div class="grid-2">
            <label>
              签署人职务/身份（俄语）
              <input id="signerTitle" value="">
            </label>
            <label>
              签署人姓名（俄语）
              <input id="signerName" value="">
            </label>
          </div>
        </div>

        <div id="errorBox" class="notice error"></div>
        <div id="statusBox" class="notice status"></div>
        <div class="toolbar" style="margin-top: 16px;">
          <button id="downloadBtn" class="primary" type="button">生成 Word</button>
          <button id="selfTestBtn" type="button">模板自检</button>
        </div>

        <div class="notice">说明：多个投诉对象会生成一个 zip；每个 Word 都基于同一份俄语模板，只替换模板空线里的文字。举报方下拉框资料会保存在当前浏览器本地，方便团队各自维护常用申请人信息。</div>
      </div>
    </section>

    <aside class="card">
      <div class="section-head">
        <h2>生成预览</h2>
      </div>
      <div class="content">
        <div id="summary" class="summary"></div>
        <div class="notice">这里显示即将写入模板的关键内容；最终 Word 仍以原模板格式为准。</div>
      </div>
    </aside>
  </main>

  <script>

        sellerEmail: "szll246855@gmail.com",
        sellerInn: "7720967362",
        sellerOgrn: "1267700191923"
      }
    ];

    const complaintIds = [
      "complaintTitle", "sellerName", "productName", "productLink", "requestChoice", "customRequest"
    ];

    let complaints = [blankComplaint(1)];
    let activeComplaintIndex = 0;
    let sellerProfiles = loadSellerProfiles();

    function $(id) {
      return document.getElementById(id);
    }

    function blankComplaint(number) {
      return {
        complaintTitle: `投诉对象 ${number}`,
        sellerName: "",
        productName: "",
        productLink: "",
        requestChoice: "0",
        customRequest: ""
      };
    }

    function setDefaultDate() {
      const now = new Date();
      $("dateDay").value = String(now.getDate()).padStart(2, "0");
      $("dateMonth").value = monthOptions[now.getMonth()].ru;
      $("dateYear").value = String(now.getFullYear());
    }

    function loadSellerProfiles() {
      try {
        const saved = JSON.parse(localStorage.getItem(SELLER_STORAGE_KEY) || "[]");
        if (Array.isArray(saved)) return saved;
      } catch (_) {
      }
      return [];
    }

    function saveSellerProfiles() {
      localStorage.setItem(SELLER_STORAGE_KEY, JSON.stringify(sellerProfiles));
    }

    function renderSelects() {
      $("legalBasis").innerHTML = legalBasisOptions.map((item, index) =>
        `<option value="${index}">${escapeHtml(item.cn)} ｜ ${escapeHtml(item.ru)}</option>`
      ).join("");

      $("requestChoice").innerHTML = requestOptions.map((item, index) =>
        `<option value="${index}">${escapeHtml(item.cn)}${item.ru ? ` ｜ ${escapeHtml(item.ru)}` : ""}</option>`
      ).join("");

      renderSellerPresetOptions();
      renderDateSelects();
    }

    function renderDateSelects() {
      $("dateDay").innerHTML = Array.from({ length: 31 }, (_, index) => {
        const day = String(index + 1).padStart(2, "0");
        return `<option value="${day}">${day}</option>`;
      }).join("");

      $("dateMonth").innerHTML = monthOptions.map((item) =>
        `<option value="${escapeHtml(item.ru)}">${escapeHtml(item.cn)} ｜ ${escapeHtml(item.ru)}</option>`
      ).join("");

      const year = new Date().getFullYear();
      $("dateYear").innerHTML = Array.from({ length: 9 }, (_, index) => year - 3 + index).map((item) =>
        `<option value="${item}">${item}</option>`
      ).join("");
    }

    function renderSellerPresetOptions() {
      const builtInOptions = builtInSellerProfiles.map((item, index) =>
        `<option value="built:${index}">${escapeHtml(profileOptionLabel(item, index))}</option>`
      ).join("");
      const savedOptions = sellerProfiles.map((item, index) =>
        `<option value="saved:${index}">${escapeHtml(item.sellerName || `常用举报方 ${index + 1}`)}</option>`
      ).join("");
      const options = [
        `<option value="">手动填写 / 不使用预设举报方</option>`,
        `<optgroup label="Excel 举报方信息表">${builtInOptions}</optgroup>`
      ];
      if (savedOptions) {
        options.push(`<optgroup label="我保存的常用举报方">${savedOptions}</optgroup>`);
      }
      $("reporterPreset").innerHTML = options.join("");
    }

    function profileOptionLabel(item, index) {
      const cn = item.sourceName ? `${item.sourceName} / ` : "";
      return `${cn}${item.sellerShortName || item.sellerName || `Excel 举报方 ${index + 1}`}`;
    }

    function saveCurrentComplaintFromForm() {
      const current = complaints[activeComplaintIndex];
      complaintIds.forEach((id) => {
        current[id] = $(id).value;
      });
    }

    function loadComplaintToForm(index) {
      activeComplaintIndex = index;
      const current = complaints[index];
      complaintIds.forEach((id) => {
        $(id).value = current[id] || "";
      });
      $("requestChoice").value = current.requestChoice || "0";
      renderComplaintTabs();
      renderDynamicText();
      renderSummary();
    }

    function renderComplaintTabs() {
      $("complaintTabs").innerHTML = complaints.map((item, index) => {
        const title = item.complaintTitle || item.sellerName || `投诉对象 ${index + 1}`;
        return `<button type="button" class="complaint-tab ${index === activeComplaintIndex ? "active" : ""}" data-index="${index}">${escapeHtml(title)}</button>`;
      }).join("");

      document.querySelectorAll(".complaint-tab").forEach((button) => {
        button.addEventListener("click", () => {
          saveCurrentComplaintFromForm();
          loadComplaintToForm(Number(button.dataset.index));
        });
      });
    }

    function currentLegalBasis() {
      return legalBasisOptions[Number($("legalBasis").value) || 0].ru;
    }

    function currentRequest() {
      const selected = requestOptions[Number($("requestChoice").value) || 0];
      return selected.ru || $("customRequest").value.trim();
    }

    function contactLine() {
      const phone = $("reporterPhone").value.trim();
      const email = $("reporterEmail").value.trim();
      return [phone ? `тел.: ${phone}` : "", email ? `e-mail: ${email}` : ""].filter(Boolean).join(", ");
    }

    function buildPlaceholderValues(complaint) {
      const requestIndex = Number(complaint.requestChoice) || 0;
      const request = requestOptions[requestIndex].ru || complaint.customRequest || "";
      return [
        complaint.sellerName || "",
        $("reporterName").value.trim(),
        $("reporterAddress").value.trim(),
        $("reporterPhone").value.trim(),
        $("reporterEmail").value.trim(),
        $("reporterInn").value.trim(),
        $("reporterOgrn").value.trim(),
        $("claimantName").value.trim(),
        $("ipObjectName").value.trim(),
        $("proofInfo").value.trim(),
        complaint.productName || "",
        complaint.productLink || "",
        currentLegalBasis(),
        request,
        $("attachmentOne").value.trim(),
        $("attachmentTwo").value.trim(),
        $("dateDay").value.trim(),
        $("dateMonth").value.trim(),
        $("dateYear").value.trim(),
        $("signerTitle").value.trim(),
        $("signerName").value.trim()
      ];
    }

    function renderDynamicText() {
      const legalItem = legalBasisOptions[Number($("legalBasis").value) || 0];
      $("legalBasisText").textContent = `写入俄语：${legalItem.ru}`;
      const request = currentRequest();
      $("requestText").textContent = request ? `写入俄语：${request}` : "选择“其他”后，请填写俄语请求内容。";
      $("customRequest").style.display = requestOptions[Number($("requestChoice").value) || 0].ru ? "none" : "block";
    }

    function renderSummary() {
      saveCurrentComplaintFromForm();
      const current = complaints[activeComplaintIndex];
      const rows = [
        ["被举报方", current.sellerName],
        ["举报方", $("reporterName").value],
        ["举报方联系", [$("reporterAddress").value, $("reporterPhone").value, $("reporterEmail").value].filter(Boolean).join(" / ")],
        ["举报方税号/注册号", [$("reporterInn").value, $("reporterOgrn").value].filter(Boolean).join(" / ")],
        ["权利人", $("claimantName").value],
        ["法律依据", currentLegalBasis()],
        ["请求事项", currentRequest()],
        ["商品卡片", [current.productName, current.productLink].filter(Boolean).join(" / ")],
        ["生成数量", `${complaints.length} 份 Word`]
      ];
      $("summary").innerHTML = rows.map(([key, val]) =>
        `<div class="summary-row"><strong>${escapeHtml(key)}</strong><span>${escapeHtml(val || "未填写")}</span></div>`
      ).join("");
    }

    function showError(message) {
      const box = $("errorBox");
      box.textContent = message || "";
      box.style.display = message ? "block" : "none";
    }

    function showStatus(message) {
      const box = $("statusBox");
      box.textContent = message || "";
      box.style.display = message ? "block" : "none";
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeXml(text) {
      return String(text || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&apos;"
      }[char]));
    }

    function base64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function replacePlaceholdersInXml(xml, values) {
      const nodeRegex = /(<w:t\b[^>]*>)([\s\S]*?)(<\/w:t>)/g;
      const nodes = [];
      let match;
      while ((match = nodeRegex.exec(xml))) {
        nodes.push({
          start: match.index,
          end: match.index + match[0].length,
          open: match[1],
          text: match[2],
          close: match[3]
        });
      }

      const runs = [];
      let current = [];
      const finishRun = () => {
        if (current.length >= 3) runs.push(current);
        current = [];
      };

      nodes.forEach((node, nodeIndex) => {
        for (let i = 0; i < node.text.length; i += 1) {
          if (node.text[i] === "_") {
            current.push({ nodeIndex, index: i });
          } else {
            finishRun();
          }
        }
      });
      finishRun();

      if (runs.length < PLACEHOLDER_COUNT) {
        throw new Error(`模板空线数量异常：识别到 ${runs.length} 个，预期至少 ${PLACEHOLDER_COUNT} 个。`);
      }

      runs.slice(0, PLACEHOLDER_COUNT).reverse().forEach((run, reverseIndex) => {
        const placeholderIndex = PLACEHOLDER_COUNT - 1 - reverseIndex;
        const original = "_".repeat(run.length);
        const rawValue = values[placeholderIndex];
        const replacement = rawValue && String(rawValue).trim() ? escapeXml(rawValue) : original;
        const byNode = new Map();

        run.forEach((pos) => {
          if (!byNode.has(pos.nodeIndex)) byNode.set(pos.nodeIndex, []);
          byNode.get(pos.nodeIndex).push(pos.index);
        });

        const affected = [...byNode.keys()].sort((a, b) => a - b);
        affected.reverse().forEach((nodeIndex) => {
          const indexes = byNode.get(nodeIndex).sort((a, b) => a - b);
          const start = indexes[0];
          const end = indexes[indexes.length - 1] + 1;
          const node = nodes[nodeIndex];
          const isFirst = nodeIndex === affected[affected.length - 1];
          node.text = node.text.slice(0, start) + (isFirst ? replacement : "") + node.text.slice(end);
        });
      });

      let rebuilt = "";
      let last = 0;
      nodes.forEach((node) => {
        rebuilt += xml.slice(last, node.start);
        rebuilt += node.open + node.text + node.close;
        last = node.end;
      });
      rebuilt += xml.slice(last);
      return rebuilt;
    }

    function buildDocxBytes(values) {
      if (!window.fflate || !window.CLAIM_TEMPLATE_DOCX_BASE64) {
        throw new Error("模板资源没有加载成功，请刷新页面后再试。");
      }
      const template = base64ToBytes(window.CLAIM_TEMPLATE_DOCX_BASE64);
      const zip = fflate.unzipSync(template);
      const xmlPath = "word/document.xml";
      const xml = fflate.strFromU8(zip[xmlPath]);
      const replaced = replacePlaceholdersInXml(xml, values);
      zip[xmlPath] = fflate.strToU8(replaced);
      return fflate.zipSync(zip, { level: 6 });
    }

    function safeFileName(text) {
      return String(text || "claim").trim().replace(/[\\/:*?"<>|]/g, "_") || "claim";
    }

    function downloadBytes(bytes, fileName, type) {
      const blob = new Blob([bytes], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function downloadWord() {
      try {
        saveCurrentComplaintFromForm();
        showError("");
        showStatus("");
        if (!complaints.length) throw new Error("请至少保留一个投诉对象。");

        if (complaints.length === 1) {
          const values = buildPlaceholderValues(complaints[0]);
          const bytes = buildDocxBytes(values);
          downloadBytes(bytes, `${safeFileName(complaints[0].complaintTitle || complaints[0].sellerName || "侵权索赔")}.docx`, "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
          return;
        }

        const files = {};
        complaints.forEach((complaint, index) => {
          const values = buildPlaceholderValues(complaint);
          const bytes = buildDocxBytes(values);
          const name = safeFileName(complaint.complaintTitle || complaint.sellerName || `投诉对象_${index + 1}`);
          files[`${index + 1}_${name}.docx`] = bytes;
        });
        const zipped = fflate.zipSync(files, { level: 6 });
        downloadBytes(zipped, "侵权索赔Word批量.zip", "application/zip");
      } catch (error) {
        showError(error.message || String(error));
      }
    }

    function selfTestTemplate() {
      try {
        saveCurrentComplaintFromForm();
        showError("");
        showStatus("");
        const values = buildPlaceholderValues(complaints[activeComplaintIndex]);
        const bytes = buildDocxBytes(values);
        showStatus(`模板自检通过：已在浏览器内生成 Word 数据，大小 ${(bytes.length / 1024).toFixed(1)} KB。`);
      } catch (error) {
        showError(error.message || String(error));
      }
    }

    function saveSellerProfile() {
      saveCurrentComplaintFromForm();
      if (!$("reporterName").value.trim()) {
        showError("请先填写举报方/申请人全称，再保存为常用举报方。");
        return;
      }
      showError("");
      const profile = {
        sellerName: $("reporterName").value.trim(),
        sellerAddress: $("reporterAddress").value.trim(),
        sellerPhone: $("reporterPhone").value.trim(),
        sellerEmail: $("reporterEmail").value.trim(),
        sellerInn: $("reporterInn").value.trim(),
        sellerOgrn: $("reporterOgrn").value.trim()
      };
      const existingIndex = sellerProfiles.findIndex((item) => item.sellerName === profile.sellerName);
      if (existingIndex >= 0) {
        sellerProfiles[existingIndex] = profile;
      } else {
        sellerProfiles.push(profile);
      }
      saveSellerProfiles();
      renderSellerPresetOptions();
      $("reporterPreset").value = `saved:${Math.max(0, sellerProfiles.findIndex((item) => item.sellerName === profile.sellerName))}`;
    }

    function applySellerProfile() {
      const value = $("reporterPreset").value;
      if (value === "") return;
      let profile = null;
      if (value.startsWith("built:")) {
        profile = builtInSellerProfiles[Number(value.slice(6))];
      } else if (value.startsWith("saved:")) {
        profile = sellerProfiles[Number(value.slice(6))];
      }
      if (!profile) return;
      $("reporterName").value = profile.sellerName || "";
      $("reporterAddress").value = profile.sellerAddress || "";
      $("reporterPhone").value = profile.sellerPhone || "";
      $("reporterEmail").value = profile.sellerEmail || "";
      $("reporterInn").value = profile.sellerInn || "";
      $("reporterOgrn").value = profile.sellerOgrn || "";
      saveCurrentComplaintFromForm();
      renderComplaintTabs();
      renderSummary();
    }

    function bindEvents() {
      [...commonIds, ...complaintIds].forEach((id) => {
        const update = () => {
          saveCurrentComplaintFromForm();
          renderComplaintTabs();
          renderDynamicText();
          renderSummary();
        };
        $(id).addEventListener("input", update);
        $(id).addEventListener("change", update);
      });

      $("legalBasis").addEventListener("change", () => {
        renderDynamicText();
        renderSummary();
      });
      $("requestChoice").addEventListener("change", () => {
        saveCurrentComplaintFromForm();
        renderDynamicText();
        renderSummary();
      });
      $("reporterPreset").addEventListener("change", applySellerProfile);
      $("saveSellerBtn").addEventListener("click", saveSellerProfile);
      $("downloadBtn").addEventListener("click", downloadWord);
      $("selfTestBtn").addEventListener("click", selfTestTemplate);

      $("addComplaintBtn").addEventListener("click", () => {
        saveCurrentComplaintFromForm();
        complaints.push(blankComplaint(complaints.length + 1));
        loadComplaintToForm(complaints.length - 1);
      });

      $("cloneComplaintBtn").addEventListener("click", () => {
        saveCurrentComplaintFromForm();
        const source = complaints[activeComplaintIndex];
        const clone = { ...source, complaintTitle: `${source.complaintTitle || source.sellerName || "投诉对象"} - 复制` };
        complaints.push(clone);
        loadComplaintToForm(complaints.length - 1);
      });

      $("removeComplaintBtn").addEventListener("click", () => {
        if (complaints.length === 1) {
          showError("至少需要保留一个投诉对象。");
          return;
        }
        complaints.splice(activeComplaintIndex, 1);
        loadComplaintToForm(Math.max(0, activeComplaintIndex - 1));
      });
    }

    renderSelects();
    setDefaultDate();
    bindEvents();
    loadComplaintToForm(0);
  </script>
